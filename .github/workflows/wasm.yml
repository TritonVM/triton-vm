name: WASM

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: Build, lint, test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install stable toolchain
        run: rustup install

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install wasm-pack
        uses: taiki-e/install-action@a2352fc6ce487f030a3aa709482d57823eadfb37 # v2.75.16
        with:
          tool: wasm-pack

      - name: Build with wasm-pack
        working-directory: triton-vm
        run: wasm-pack build --release --target nodejs

      # Because of weird and hard-to-find limitations somewhere in the testing pipeline,
      # running (1) the full test suite (2) through `wasm-pack test` on (3) CI machines
      # causes relatively consistent CI failures.
      # The solution deployed here runs every test individually instead. This clutters
      # the CI log, but at least it gives a green checkmark.
      - name: Run wasm-pack tests (one by one)
        working-directory: triton-vm
        run: |
          set -euo pipefail

          mapfile -t TESTS < <(
            cargo test --manifest-path "${PWD}/Cargo.toml" -- --list 2>&1 \
            | awk '/^[^[:space:]]+: test$/ { sub(/: test$/,""); print }'
          )

          if (( ${#TESTS[@]} == 0 )); then
            echo "No tests found; check the --list output parsing."
            exit 1
          fi

          for test in "${TESTS[@]}"; do
            wasm-pack test --node -- -- --exact "$test"
          done
